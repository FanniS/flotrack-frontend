<form class="form-container" [formGroup]="piechartForm">
  <h1 class="header"> Transactions by Category</h1>
  <div class="radio-group">
    <div class="categories">
      <label for="categoryTypeExpense">Expense</label>
      <input id="categoryTypeExpense" type="radio" formControlName="currentIsExpense" [value]="true" checked />
    </div>
    <div class="categories">
      <label for="categoryTypeIncome">Income</label>
      <input id="categoryTypeIncome" type="radio" formControlName="currentIsExpense" [value]="false" />
    </div>
  </div>
</form>

<div class="chart-container">
  <canvas baseChart [data]="pieChartData" [labels]="pieChartData.labels" [type]="pieChartType">
  </canvas>
</div>
